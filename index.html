<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;color:#fff;font-family:Arial,sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:manipulation}

#blur{
  position:fixed;inset:0;
  background-size:cover;background-position:center;
  filter:blur(20px) brightness(.5);
  transform:scale(1.15);
  z-index:0;
  transition:background-image .5s ease;
}
#blur-video{
  position:fixed;inset:0;
  z-index:0;display:none;overflow:hidden;
}
#blur-video video{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(1.15);
  min-width:100vw;min-height:100vh;
  width:auto;height:auto;
  object-fit:cover;
  filter:blur(20px) brightness(.5);
  pointer-events:none;
}

#display{
  position:fixed;inset:0;
  display:flex;justify-content:center;align-items:center;
  z-index:1;
}
#display img{
  max-width:90%;height:100vh;
  object-fit:contain;
  opacity:0;transition:opacity .7s ease-in-out;
}
#display img.visible{opacity:1}
#display video{width:auto;height:100vh;object-fit:contain}

#counter{
  position:fixed;top:20px;right:20px;
  background:rgba(0,0,0,.8);padding:12px 18px;
  border-radius:10px;font-size:16px;z-index:1000;
}
#controls{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.9);padding:15px 30px;
  border-radius:30px;display:flex;gap:20px;
  opacity:0;transition:opacity .3s;z-index:1000;
}
#controls:hover{opacity:1}
.btn{
  background:#007bff;color:#fff;border:none;
  padding:15px 25px;border-radius:10px;
  cursor:pointer;font-size:18px;min-width:120px;font-weight:bold;
}
.btn:hover{background:#0056b3}
#loading{
  position:fixed;inset:0;display:flex;
  justify-content:center;align-items:center;
  font-size:24px;background:rgba(0,0,0,.9);z-index:2000;text-align:center;
}
.zone{position:fixed;top:0;height:100vh;z-index:500}
#zL{left:0;width:33vw}
#zC{left:33vw;width:34vw}
#zR{right:0;width:33vw}
</style>
</head>
<body>

<div id="loading">Cargando...</div>
<div id="blur"></div>
<div id="blur-video"><video id="blur-vid" muted loop playsinline></video></div>
<div id="counter"></div>
<div id="display"></div>

<div id="controls">
  <button class="btn" id="btnPrev">◀◀</button>
  <button class="btn" id="btnPlay">⏸</button>
  <button class="btn" id="btnNext">▶▶</button>
</div>
<div class="zone" id="zL"></div>
<div class="zone" id="zC"></div>
<div class="zone" id="zR"></div>

<script>
const FILES = [
  {type:'image',path:'imagenes/a1.webp'},
  {type:'image',path:'imagenes/a2.webp'},
  {type:'image',path:'imagenes/a3.webp'},
  {type:'image',path:'imagenes/a4.webp'},
  {type:'image',path:'imagenes/a5.webp'},
  {type:'image',path:'imagenes/a6.webp'},
  {type:'image',path:'imagenes/a7.webp'},
  {type:'image',path:'imagenes/a8.webp'},
  {type:'image',path:'imagenes/a9.webp'},
  {type:'image',path:'imagenes/a10.webp'},
  {type:'image',path:'imagenes/b1.webp'},
  {type:'image',path:'imagenes/b2.webp'},
  {type:'image',path:'imagenes/b3.webp'},
  {type:'image',path:'imagenes/b4.webp'},
  {type:'image',path:'imagenes/b5.webp'},
  {type:'image',path:'imagenes/b6.webp'},
  {type:'image',path:'imagenes/b7.webp'},
  {type:'image',path:'imagenes/b8.webp'},
  {type:'image',path:'imagenes/b9.webp'},
  {type:'image',path:'imagenes/b10.webp'},
  {type:'image',path:'imagenes/b11.webp'},
  {type:'image',path:'imagenes/b12.webp'},
  {type:'video',path:'videos/video1.mp4'},
  {type:'video',path:'videos/video2.mp4'},
  {type:'video',path:'videos/video3.mp4'},
  {type:'video',path:'videos/video4.mp4'},
  {type:'video',path:'videos/video5.mp4'},
  {type:'video',path:'videos/video6.mp4'},
  {type:'video',path:'videos/video7.mp4'},
  {type:'video',path:'videos/video8.mp4'},
  {type:'video',path:'videos/video9.mp4'},
  {type:'video',path:'videos/video10.mp4'},
  {type:'video',path:'videos/video11.mp4'},
];

const $        = id => document.getElementById(id);
const elDisp   = $('display');
const elBlur   = $('blur');
const elBlurBx = $('blur-video');
const elBlurV  = $('blur-vid');
const elCnt    = $('counter');
const elCtrl   = $('controls');
const elBtnPl  = $('btnPlay');
const elLoad   = $('loading');

const music = new Audio('onsupplymusic.mp3');
music.loop = true; music.volume = 1;

let files=[], idx=0, playing=true, current=null;
let slideTimer=null, transitioning=false;
const SLIDE_MS = 5000;

/* ── verificar archivos ── */
async function init() {
  const valid = [];
  for (const f of FILES) {
    try { const r = await fetch(f.path,{method:'HEAD'}); if(r.ok) valid.push(f); } catch(e){}
  }
  if (!valid.length) { elLoad.innerHTML='<p style="color:#f44">No se encontraron archivos.</p>'; return; }
  files = valid;
  elLoad.style.display = 'none';
  load();
}

/* ── limpiar display completamente ── */
function clearDisplay() {
  if (current) {
    if (current.tagName === 'VIDEO') {
      current.pause();
      current.removeAttribute('src');
      current.load();           // libera el recurso
    }
    current = null;
  }
  elDisp.innerHTML = '';        // elimina el elemento del DOM
}

/* ── cargar índice actual ── */
function load() {
  if (!files.length) return;
  clearTimer();
  clearDisplay();               // siempre limpiar ANTES de agregar el nuevo

  const f = files[idx];
  elCnt.textContent = `${idx+1} / ${files.length}`;

  if (f.type === 'image') {
    // ocultar blur de video
    elBlurBx.style.display = 'none';
    elBlurV.pause();
    elBlurV.removeAttribute('src');
    music.play().catch(()=>{});
    loadImage(f);
  } else {
    music.pause();
    loadVideo(f);
  }
}

/* ── imagen ── */
function loadImage(f) {
  const img = new Image();
  img.onload = () => {
    elBlur.style.backgroundImage = `url('${f.path}')`;
    elDisp.appendChild(img);
    current = img;
    requestAnimationFrame(() => requestAnimationFrame(() => img.classList.add('visible')));
    if (playing) startTimer();
  };
  img.onerror = () => advance(1);
  img.src = f.path;
}

/* ── video ── */
function loadVideo(f) {
  const v = document.createElement('video');
  v.src = f.path;
  v.autoplay = true;
  v.muted = false;
  v.playsInline = true;
  v.setAttribute('playsinline','');

  v.onloadeddata = () => {
    // fondo blur con el mismo video
    elBlur.style.backgroundImage = 'none';
    elBlurV.src = f.path;
    elBlurV.play().catch(()=>{});
    elBlurBx.style.display = 'block';

    // agregar al display SOLO aquí, cuando ya está listo
    elDisp.appendChild(v);
    current = v;
    v.play().catch(() => advance(1));
  };

  v.onended  = () => { music.play().catch(()=>{}); advance(1); };
  v.onplay   = () => { playing=true;  elBtnPl.textContent='⏸'; };
  v.onpause  = () => { playing=false; elBtnPl.textContent='▶'; };
  v.onerror  = () => advance(1);
}

/* ── timer slideshow ── */
function startTimer() {
  clearTimer();
  slideTimer = setTimeout(() => advance(1), SLIDE_MS);
  playing = true; elBtnPl.textContent = '⏸';
}
function clearTimer() {
  if (slideTimer) { clearTimeout(slideTimer); slideTimer=null; }
}

/* ── avanzar / retroceder ── */
function advance(dir) {
  if (transitioning) return;
  const f = files[idx];

  if (f?.type === 'image' && current instanceof HTMLImageElement) {
    transitioning = true;
    clearTimer();
    current.classList.remove('visible');
    setTimeout(() => {
      transitioning = false;
      idx = (idx + dir + files.length) % files.length;
      load();
    }, 750);
  } else {
    idx = (idx + dir + files.length) % files.length;
    load();
  }
}

/* ── play / pause ── */
function togglePlay() {
  const f = files[idx];
  if (!f) return;
  if (f.type === 'image') {
    if (playing) { clearTimer(); playing=false; elBtnPl.textContent='▶'; }
    else startTimer();
  } else if (current instanceof HTMLVideoElement) {
    current.paused ? current.play() : current.pause();
  }
}

/* ── controles visibles temporalmente ── */
let hideCtrl;
function showControls() {
  elCtrl.style.opacity='1';
  clearTimeout(hideCtrl);
  hideCtrl = setTimeout(() => elCtrl.style.opacity='0', 3000);
}

/* ── eventos ── */
$('btnPrev').onclick = () => { advance(-1); showControls(); };
$('btnNext').onclick = () => { advance(1);  showControls(); };
elBtnPl.onclick      = () => { togglePlay(); showControls(); };
$('zL').onclick = () => { advance(-1); showControls(); };
$('zR').onclick = () => { advance(1);  showControls(); };
$('zC').onclick = () => { togglePlay(); showControls(); };

document.addEventListener('keydown', e => {
  if      (e.key==='ArrowLeft')  advance(-1);
  else if (e.key==='ArrowRight') advance(1);
  else if (e.key===' ')          { e.preventDefault(); togglePlay(); }
});

document.addEventListener('dblclick', () => {
  (document.fullscreenElement
    ? document.exitFullscreen()
    : document.documentElement.requestFullscreen()
  ).catch(()=>{});
});

init();
</script>
</body>
</html>
