<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }

        #blurBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(15px) brightness(0.7);
            transform: scale(1.1);
            z-index: -1;
            transition: background-image 0.5s ease;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: black;
        }

        #mediaDisplay {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ✅ IMÁGENES RESPONSIVAS - se ajustan a cualquier pantalla sin cortar */
        #mediaDisplay img {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 0.7s ease-in-out;
        }

        .media-visible {
            opacity: 1 !important;
        }

        .media-fade-out {
            opacity: 0 !important;
        }

        /* ✅ VIDEOS RESPONSIVOS - se ajustan a cualquier pantalla sin cortar */
        #mediaDisplay video {
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 30px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        #controls:hover {
            opacity: 1;
        }

        .control-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            min-width: 120px;
            font-weight: bold;
        }

        .control-btn:hover {
            background: #0056b3;
        }

        #fileCounter {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 16px;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            text-align: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
        }

        .touch-zone {
            position: fixed;
            height: 100vh;
            width: 33vw;
            top: 0;
            z-index: 500;
        }

        #touchLeft  { left: 0; }
        #touchRight { right: 0; }
        #touchCenter { left: 33vw; width: 34vw; }
    </style>
</head>
<body>
    <div id="loading">Cargando...</div>

    <div id="container" class="hidden">
        <div id="fileCounter"></div>
        <div id="blurBackground"></div>
        <div id="mediaDisplay"></div>

        <div id="controls">
            <button class="control-btn" id="prevBtn">◀◀</button>
            <button class="control-btn" id="playPauseBtn">⏸</button>
            <button class="control-btn" id="nextBtn">▶▶</button>
        </div>

        <div id="touchOverlay">
            <div class="touch-zone" id="touchLeft"></div>
            <div class="touch-zone" id="touchCenter"></div>
            <div class="touch-zone" id="touchRight"></div>
        </div>
    </div>

    <script>
        class MediaPlayer {
            constructor() {
                this.mediaFiles = [];
                this.currentIndex = 0;
                this.isPlaying = true;
                this.currentMedia = null;
                this.slideInterval = null;
                this.slideDuration = 5000;
                this.videoEndedHandler = null;

                this.backgroundMusic = new Audio('onsupplymusic.mp3');
                this.backgroundMusic.loop = true;
                this.backgroundMusic.volume = 1;

                this.blurBackground = null;

                this.initializeElements();
                this.setupEventListeners();
                this.loadMediaFiles();
            }

            initializeElements() {
                this.container = document.getElementById('container');
                this.mediaDisplay = document.getElementById('mediaDisplay');
                this.controls = document.getElementById('controls');
                this.prevBtn = document.getElementById('prevBtn');
                this.playPauseBtn = document.getElementById('playPauseBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.loading = document.getElementById('loading');
                this.fileCounter = document.getElementById('fileCounter');
                this.touchLeft = document.getElementById('touchLeft');
                this.touchCenter = document.getElementById('touchCenter');
                this.touchRight = document.getElementById('touchRight');
                this.blurBackground = document.getElementById('blurBackground');
            }

            async enterFullScreen() {
                try {
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        await document.documentElement.webkitRequestFullscreen();
                    }
                } catch (error) {}
            }

            loadMediaFiles() {
                this.mediaFiles = [
                    { name: 'a0.webp',  type: 'image', path: 'imagenes/a0.webp' },
                    { name: 'a1.webp',  type: 'image', path: 'imagenes/a1.webp' },
                    { name: 'a2.webp',  type: 'image', path: 'imagenes/a2.webp' },
                    { name: 'a3.webp',  type: 'image', path: 'imagenes/a3.webp' },
                    { name: 'a4.webp',  type: 'image', path: 'imagenes/a4.webp' },
                    { name: 'a5.webp',  type: 'image', path: 'imagenes/a5.webp' },
                    { name: 'a6.webp',  type: 'image', path: 'imagenes/a6.webp' },
                    { name: 'a7.webp',  type: 'image', path: 'imagenes/a7.webp' },
                    { name: 'a8.webp',  type: 'image', path: 'imagenes/a8.webp' },
                    { name: 'a9.webp',  type: 'image', path: 'imagenes/a9.webp' },
                    { name: 'a10.webp', type: 'image', path: 'imagenes/a10.webp' },
                    { name: 'a11.webp', type: 'image', path: 'imagenes/a11.webp' },
                    { name: 'a12.webp', type: 'image', path: 'imagenes/a12.webp' },
                    { name: 'a13.webp', type: 'image', path: 'imagenes/a13.webp' },
                    { name: 'a14.webp', type: 'image', path: 'imagenes/a14.webp' },
                    { name: 'a15.webp', type: 'image', path: 'imagenes/a15.webp' },
                    { name: 'a16.webp', type: 'image', path: 'imagenes/a16.webp' },
                    { name: 'a17.webp', type: 'image', path: 'imagenes/a17.webp' },
                    { name: 'video1.mp4',  type: 'video', path: 'videos/video1.mp4' },
                    { name: 'video2.mp4',  type: 'video', path: 'videos/video2.mp4' },
                    { name: 'video3.mp4',  type: 'video', path: 'videos/video3.mp4' },
                    { name: 'video4.mp4',  type: 'video', path: 'videos/video4.mp4' },
                    { name: 'video5.mp4',  type: 'video', path: 'videos/video5.mp4' },
                    { name: 'video6.mp4',  type: 'video', path: 'videos/video6.mp4' },
                    { name: 'video7.mp4',  type: 'video', path: 'videos/video7.mp4' },
                    { name: 'video8.mp4',  type: 'video', path: 'videos/video8.mp4' },
                    { name: 'video9.mp4',  type: 'video', path: 'videos/video9.mp4' },
                    { name: 'video10.mp4', type: 'video', path: 'videos/video10.mp4' },
                    { name: 'video11.mp4', type: 'video', path: 'videos/video11.mp4' },
                ];

                this.checkExistingFiles().then(existingFiles => {
                    this.mediaFiles = existingFiles;
                    if (this.mediaFiles.length > 0) {
                        this.showInterface();
                        this.updateFileCounter();
                        this.loadCurrentMedia();
                    } else {
                        this.showError('No se encontraron archivos. Verifica las rutas.');
                    }
                });
            }

            async checkExistingFiles() {
                const existingFiles = [];
                for (const file of this.mediaFiles) {
                    try {
                        const response = await fetch(file.path, { method: 'HEAD' });
                        if (response.status === 200) existingFiles.push(file);
                    } catch (e) {}
                }
                return existingFiles;
            }

            showInterface() {
                if (this.loading && this.container) {
                    this.loading.classList.add('hidden');
                    this.container.classList.remove('hidden');
                }
            }

            loadCurrentMedia() {
                if (this.mediaFiles.length === 0) return;

                const file = this.mediaFiles[this.currentIndex];

                if (file.type === 'video') {
                    this.backgroundMusic.pause();
                } else {
                    this.backgroundMusic.play().catch(() => {});
                }

                if (this.mediaDisplay) this.mediaDisplay.innerHTML = '';
                if (this.controls) this.controls.style.display = 'flex';

                if (this.videoEndedHandler && this.currentMedia) {
                    this.currentMedia.removeEventListener('ended', this.videoEndedHandler);
                }

                if (file.type === 'image') {
                    this.loadImage(file);
                } else {
                    this.loadVideo(file);
                }

                this.updateFileCounter();
            }

            loadImage(file) {
                const img = new Image();
                img.style.opacity = '0';

                img.onload = () => {
                    this.currentMedia = img;
                    if (this.mediaDisplay) this.mediaDisplay.appendChild(img);
                    if (this.blurBackground) {
                        this.blurBackground.style.backgroundImage = `url('${file.path}')`;
                    }
                    setTimeout(() => img.classList.add('media-visible'), 50);
                    if (this.isPlaying) this.startSlideshow();
                };
                img.onerror = () => this.nextMedia();
                img.src = file.path;
            }

            loadVideo(file) {
                this.stopSlideshow();

                const video = document.createElement('video');
                video.src = file.path;
                video.controls = false;
                video.autoplay = true;
                video.muted = false;
                video.playsInline = true;
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');

                video.onloadeddata = () => {
                    this.currentMedia = video;
                    if (this.mediaDisplay) this.mediaDisplay.appendChild(video);

                    this.videoEndedHandler = () => {
                        this.isPlaying = true;
                        this.backgroundMusic.play().catch(() => {});
                        this.nextMedia();
                    };
                    video.addEventListener('ended', this.videoEndedHandler);

                    video.play().then(() => {
                        this.updatePlayPauseButton();
                    }).catch(() => {
                        this.isPlaying = true;
                        this.nextMedia();
                    });
                };

                video.onplay  = () => { this.isPlaying = true;  this.updatePlayPauseButton(); };
                video.onpause = () => { this.isPlaying = false; this.updatePlayPauseButton(); };
                video.onerror = () => this.nextMedia();
            }

            startSlideshow() {
                this.stopSlideshow();
                const file = this.mediaFiles[this.currentIndex];
                if (file && file.type === 'image') {
                    this.slideInterval = setInterval(() => this.nextMedia(), this.slideDuration);
                    this.isPlaying = true;
                    this.updatePlayPauseButton();
                }
            }

            stopSlideshow() {
                if (this.slideInterval) {
                    clearInterval(this.slideInterval);
                    this.slideInterval = null;
                }
            }

            togglePlayPause() {
                const file = this.mediaFiles[this.currentIndex];
                if (file.type === 'image') {
                    if (this.isPlaying) { this.stopSlideshow(); this.isPlaying = false; }
                    else { this.startSlideshow(); this.isPlaying = true; }
                } else if (file.type === 'video') {
                    const video = this.currentMedia;
                    if (video && video.paused) { video.play().then(() => { this.isPlaying = true; }); }
                    else if (video) { video.pause(); this.isPlaying = false; }
                }
                this.updatePlayPauseButton();
            }

            transitionOut(callback) {
                this.stopSlideshow();
                this.isPlaying = true;
                this.updatePlayPauseButton();

                const el = this.currentMedia;
                if (el && el.tagName === 'IMG') {
                    el.classList.remove('media-visible');
                    el.classList.add('media-fade-out');
                    setTimeout(() => {
                        if (el.parentNode === this.mediaDisplay) this.mediaDisplay.removeChild(el);
                        callback();
                    }, 750);
                } else {
                    callback();
                }
            }

            nextMedia() {
                const file = this.mediaFiles[this.currentIndex];
                if (file && file.type === 'image') {
                    this.transitionOut(() => {
                        this.currentIndex = (this.currentIndex + 1) % this.mediaFiles.length;
                        this.loadCurrentMedia();
                    });
                } else {
                    this.currentIndex = (this.currentIndex + 1) % this.mediaFiles.length;
                    this.loadCurrentMedia();
                }
            }

            prevMedia() {
                const file = this.mediaFiles[this.currentIndex];
                if (file && file.type === 'image') {
                    this.transitionOut(() => {
                        this.currentIndex = this.currentIndex > 0 ? this.currentIndex - 1 : this.mediaFiles.length - 1;
                        this.loadCurrentMedia();
                    });
                } else {
                    this.currentIndex = this.currentIndex > 0 ? this.currentIndex - 1 : this.mediaFiles.length - 1;
                    this.loadCurrentMedia();
                }
            }

            updatePlayPauseButton() {
                if (this.playPauseBtn) this.playPauseBtn.textContent = this.isPlaying ? '⏸' : '▶';
            }

            updateFileCounter() {
                if (this.fileCounter) this.fileCounter.textContent = `${this.currentIndex + 1} / ${this.mediaFiles.length}`;
            }

            showError(message) {
                if (this.loading) {
                    this.loading.innerHTML = `<div style="color:#f44;text-align:center;"><h3>Error</h3><p>${message}</p></div>`;
                }
            }

            setupEventListeners() {
                if (this.prevBtn)     this.prevBtn.addEventListener('click', () => this.prevMedia());
                if (this.nextBtn)     this.nextBtn.addEventListener('click', () => this.nextMedia());
                if (this.playPauseBtn) this.playPauseBtn.addEventListener('click', () => this.togglePlayPause());
                if (this.touchLeft)   this.touchLeft.addEventListener('click', () => this.prevMedia());
                if (this.touchRight)  this.touchRight.addEventListener('click', () => this.nextMedia());
                if (this.touchCenter) this.touchCenter.addEventListener('click', () => this.togglePlayPause());

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft')  this.prevMedia();
                    if (e.key === 'ArrowRight') this.nextMedia();
                    if (e.key === ' ') { e.preventDefault(); this.togglePlayPause(); }
                });

                let controlsTimeout;
                const showControls = () => {
                    if (this.controls) {
                        this.controls.style.opacity = '1';
                        clearTimeout(controlsTimeout);
                        controlsTimeout = setTimeout(() => { this.controls.style.opacity = '0'; }, 3000);
                    }
                };

                document.addEventListener('click', showControls);
                document.addEventListener('dblclick', () => this.enterFullScreen());
            }
        }

        document.addEventListener('DOMContentLoaded', () => new MediaPlayer());
    </script>
</body>
</html>
